<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Errore di accesso — Servizi digitali</title>
  <meta name="robots" content="noindex,nofollow">
  <link id="page-favicon" rel="icon" type="image/svg+xml" href="{{ static }}favicon.svg">
  <link rel="stylesheet" href="{{ static }}sso/sso.css">
</head>
<body>
<div class="sso">

  <!-- SLIM PA BAR -->
  <div class="sso-slim">
    <div class="sso-slim-in">
      <span class="gov">
        <span class="gov-dot"></span>
        <span>Sito ufficiale della Pubblica Amministrazione</span>
      </span>
    </div>
  </div>

  <!-- ENTE BRAND (placeholder) -->
  <div class="sso-brand">
    <svg class="sso-crest-svg" viewBox="0 0 64 64" fill="none" aria-label="Logo ente" role="img">
      <rect x="2" y="2" width="60" height="60" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
      <path d="M32 13 L48 21 H16 Z" fill="#64748B"/>
      <rect x="17" y="21" width="30" height="3" fill="#64748B"/>
      <rect x="20" y="26" width="4" height="18" fill="#94A3B8"/>
      <rect x="30" y="26" width="4" height="18" fill="#94A3B8"/>
      <rect x="40" y="26" width="4" height="18" fill="#94A3B8"/>
      <rect x="15" y="45" width="34" height="4" rx="1" fill="#64748B"/>
    </svg>
    <div>
      <p class="sso-brand-name">Servizi digitali</p>
    </div>
  </div>

  <!-- ERROR CARD -->
  <main class="sso-main">
    <div class="sso-card err">

      <!-- ICON — warning tone (generic auth error) -->
      <div class="sso-err-icon warn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/>
          <path d="M12 9v4"/><path d="M12 17h.01"/>
        </svg>
      </div>

      <h1 class="sso-title">Non è stato possibile completare l'accesso</h1>
      <p class="sso-lead">{{ message }}</p>

      <div class="sso-btn-row">
        <a class="btn-primary" href="javascript:history.back()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>
          </svg>
          Riprova ad accedere
        </a>
      </div>

      {% if troubleshoot %}
      <span class="sso-err-code">{{ troubleshoot }}</span>
      {% endif %}

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="sso-foot">
    <span class="agid">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="flex:0 0 auto">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      SPID · CIE · AgID
    </span>
  </footer>

</div>
<script>
fetch('/static/locales/eid-it.json').then(function(r){return r.json();}).then(function(d){
  var h=d&&d.header;
  if(h&&h.favicon_url){var f=document.getElementById('page-favicon');if(f){f.href=h.favicon_url;f.type='';}}
  if(h&&h.region_name){var n=document.querySelector('.sso-brand-name');if(n)n.textContent=h.region_name;}
  if(h&&h.logo_url){
    var img=document.createElement('img');img.className='sso-crest';img.src=h.logo_url;img.alt='Logo ente';
    var svg=document.querySelector('.sso-crest-svg');if(svg){svg.parentNode.insertBefore(img,svg);svg.style.display='none';}
  }
}).catch(function(){});
</script>
</body>
</html>
