services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: proxy
      POSTGRES_USER: proxy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - proxy_db_data:/var/lib/postgresql/data
    networks:
      - proxy-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxy"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - proxy-internal

  satosa:
    build: ./satosa
    restart: unless-stopped
    depends_on:
      config-api:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - SATOSA_CONFIG=/satosa-conf/proxy.yaml
      - SATOSA_HASH_SALT=${SATOSA_HASH_SALT:-changeme-generate-random-32chars}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - proxy_satosa_conf:/satosa-conf
    networks:
      - proxy-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/.well-known/openid-configuration || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  config-api:
    build: ./config-api
    restart: unless-stopped
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://proxy:${POSTGRES_PASSWORD}@postgres:5432/proxy
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET:-changeme-generate-random-32chars}
      - PROXY_HOSTNAME=${PROXY_HOSTNAME}
      - SATOSA_CONF_DIR=/satosa-conf
      - SATOSA_STATE_ENCRYPTION_KEY=${SATOSA_STATE_ENCRYPTION_KEY:-changeme-generate-random-state-key-32chars}
      - SATOSA_HASH_SALT=${SATOSA_HASH_SALT:-changeme-generate-random-32chars}
      - PROXY_BASE_URL=${PROXY_BASE_URL:-}
    volumes:
      - proxy_satosa_conf:/satosa-conf
    networks:
      - proxy-internal
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - config-api
      - satosa
    ports:
      - "${PROXY_HOST_PORT:-127.0.0.1:18080}:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - proxy-internal

networks:
  proxy-internal:
    driver: bridge

volumes:
  proxy_db_data:
  proxy_satosa_conf:
